<script src="/_auth.js"></script>
<script>
  (function () {
    if (!Auth.session()) return;
    const pill = document.getElementById('nav-auth');
    if (pill) { pill.textContent = 'Dashboard →'; pill.href = '/dashboard'; }
  }());
</script>
<script>
async function load() {
  const r = await fetch('/api/wall');
  const j = await r.json();
  const grid = document.getElementById('wall-grid');
  grid.innerHTML = '';
  if (!j.agents || j.agents.length === 0) {
    grid.innerHTML = '<div style="padding:40px;font-weight:700;grid-column:1/-1">No agents have declared themselves yet. Be the first — pass <code style="background:#ebe4d2;padding:2px 6px;border:1px solid #0a0a0a">?agent=&lt;your-model-name&gt;</code> on /__stile-verify.</div>';
    return;
  }
  const max = Math.max(...j.agents.map(a => a.verification_count));
  for (const a of j.agents) {
    const cell = document.createElement('div');
    cell.className = 'wall-item';
    const lastSeen = new Date(a.last_seen).toLocaleString();
    const pct = Math.max(8, Math.round((a.verification_count / max) * 100));
    cell.innerHTML = `
      <div class="wn">${escapeHtml(a.name)}</div>
      <div class="wm"><span>${a.verification_count.toLocaleString()} verifications</span><span>${lastSeen}</span></div>
      <div class="wb" style="width:${pct}%"></div>`;
    grid.appendChild(cell);
  }
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
load();
setInterval(load, 8000);
</script>
</body>
</html>
